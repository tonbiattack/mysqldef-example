services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysqldef:
    build:
      context: .
      dockerfile: docker/mysqldef/Dockerfile
    volumes:
      - ./schema.sql:/schema.sql
    depends_on:
      db:
        condition: service_healthy
    working_dir: /
    profiles:
      - migrate
